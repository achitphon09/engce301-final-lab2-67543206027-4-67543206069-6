services:

  # ── PostgreSQL DBs ────────────────────────────────────────────────
  auth-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: authdb
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
    volumes:
      - auth_db_data:/var/lib/postgresql/data
      - ./auth-service/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d authdb"]
      interval: 10s
      timeout:  5s
      retries:  5
    networks: [taskboard-net]

  task-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: taskdb
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
    volumes:
      - task_db_data:/var/lib/postgresql/data
      - ./task-service/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d taskdb"]
      interval: 10s
      timeout:  5s
      retries:  5
    networks: [taskboard-net]

  user-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: userdb
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
    volumes:
      - user_db_data:/var/lib/postgresql/data
      - ./user-service/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d userdb"]
      interval: 10s
      timeout:  5s
      retries:  5
    networks: [taskboard-net]

  # ── Auth Service ────────────────────────────────────────────────────
  auth-service:
    build: ./auth-service
    environment:
      DB_HOST:      auth-db
      DB_PORT:      5432
      DB_NAME:      authdb
      DB_USER:      admin
      DB_PASSWORD:  secret
      JWT_SECRET:   ${JWT_SECRET}
      JWT_EXPIRES:  ${JWT_EXPIRES}
      PORT:         3001
    depends_on:
      auth-db: { condition: service_healthy }
    networks: [taskboard-net]
    restart: unless-stopped

  # ── Task Service ─────────────────────────────────────────────────────
  task-service:
    build: ./task-service
    environment:
      DB_HOST:      task-db
      DB_PORT:      5432
      DB_NAME:      taskdb
      DB_USER:      admin
      DB_PASSWORD:  secret
      JWT_SECRET:   ${JWT_SECRET}
      PORT:         3002
    depends_on:
      task-db: { condition: service_healthy }
      auth-service: { condition: service_started }
    networks: [taskboard-net]
    restart: unless-stopped

  # ── User Service ─────────────────────────────────────────────────────
  user-service:
    build: ./user-service
    environment:
      DB_HOST:      user-db
      DB_PORT:      5432
      DB_NAME:      userdb
      DB_USER:      admin
      DB_PASSWORD:  secret
      JWT_SECRET:   ${JWT_SECRET}
      PORT:         3003
    depends_on:
      user-db: { condition: service_healthy }
    networks: [taskboard-net]
    restart: unless-stopped

  # ── Frontend (Static) ────────────────────────────────────────────────
  frontend:
    build: ./frontend
    networks: [taskboard-net]

  # ── Nginx (API Gateway + TLS) ────────────────────────────────────────
  nginx:
    build: ./nginx
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - auth-service
      - task-service
      - user-service
      - frontend
    networks: [taskboard-net]
    restart: unless-stopped

volumes:
  auth_db_data:
  task_db_data:
  user_db_data:

networks:
  taskboard-net:
    driver: bridge
